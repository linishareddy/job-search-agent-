services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: job_search_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsearch}
      POSTGRES_DB: ${POSTGRES_DB:-jobsearch}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobsearch}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_search_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_search_scheduler
    command: python -m config.scheduler
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
